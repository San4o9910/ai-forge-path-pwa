<style>
:root{color-scheme:dark;--bg:#080b12;--surface:#111827;--surface2:#172137;--line:#29354b;--text:#f5f7fb;--muted:#9aa8bc;--primary:#7c5cff;--cyan:#24c8ee;--green:#2dd4a8;--yellow:#f4c451;--red:#fb7185;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--text);background:radial-gradient(circle at 10% 0,rgba(124,92,255,.16),transparent 25rem),var(--bg)}button,textarea{font:inherit;color:inherit}.shell{width:min(1320px,calc(100% - 28px));margin:auto;padding:18px 0 96px}.top{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;background:rgba(8,11,18,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:10px}.mark{display:grid;place-items:center;width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#6d5dfc,#9a56f5);font-weight:900}.brand b,.brand small{display:block}.brand small{color:var(--muted)}.top-actions{display:flex;gap:8px}.btn{min-height:44px;padding:0 16px;border:1px solid transparent;border-radius:13px;font-weight:800;cursor:pointer}.primary{background:linear-gradient(135deg,#6d5dfc,#9a56f5)}.secondary{background:var(--surface2);border-color:#40506e}.quiet{background:#0b111d;border-color:var(--line);color:#c8d2e2}.btn:disabled{opacity:.45;cursor:not-allowed}.layout{display:grid;grid-template-columns:330px minmax(0,1fr);gap:16px;margin-top:18px}.card{border:1px solid var(--line);border-radius:22px;background:linear-gradient(145deg,rgba(20,29,46,.98),rgba(11,16,27,.98));box-shadow:0 18px 55px rgba(0,0,0,.25)}.sidebar{position:sticky;top:82px;align-self:start;max-height:calc(100vh - 105px);overflow:auto;padding:18px}.sidebar h1{font-size:1.35rem;margin:4px 0 8px}.sidebar>p{margin:0 0 16px;color:var(--muted);line-height:1.45}.stage{border:1px solid var(--line);border-radius:15px;overflow:hidden;margin-bottom:9px}.stage-head{width:100%;display:grid;grid-template-columns:34px 1fr auto;gap:9px;align-items:center;padding:11px;border:0;background:#0d1422;text-align:left;cursor:pointer}.stage-num{display:grid;place-items:center;width:30px;height:30px;border-radius:10px;background:rgba(124,92,255,.16);color:#c4b5fd;font-weight:900}.stage-head small{color:var(--muted)}.stage-topics{display:none;padding:6px}.stage.open .stage-topics{display:grid;gap:5px}.topic-link{width:100%;display:grid;grid-template-columns:26px minmax(0,1fr) auto;gap:8px;align-items:center;padding:9px;border:1px solid transparent;border-radius:11px;background:transparent;text-align:left;cursor:pointer}.topic-link:hover,.topic-link.active{background:rgba(124,92,255,.12);border-color:rgba(124,92,255,.35)}.topic-link.done{color:#a7f3d0}.dot{display:grid;place-items:center;width:23px;height:23px;border-radius:50%;background:#202a3d;font-size:.72rem}.topic-link.done .dot{background:var(--green);color:#052e22}.topic-link small{color:var(--muted);font-size:.68rem}.workspace{min-width:0}.hero{padding:22px}.eyebrow{margin:0;color:#aa98ff;font-size:.72rem;font-weight:900;letter-spacing:.11em}.hero-row{display:flex;justify-content:space-between;gap:18px;align-items:flex-start}.hero h1{margin:5px 0 8px;font-size:clamp(1.7rem,4vw,2.8rem);letter-spacing:-.04em}.hero p{margin:0;color:#c5cfdd;line-height:1.55}.score{flex:0 0 auto;display:grid;place-items:center;width:92px;height:92px;border-radius:50%;background:conic-gradient(var(--primary) var(--pct),#202a3d 0);position:relative}.score:before{content:"";position:absolute;inset:9px;border-radius:50%;background:#0d1422}.score b{position:relative;font-size:1.2rem}.progress{height:8px;border-radius:999px;background:#202a3d;overflow:hidden;margin-top:16px}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--cyan));transition:width .25s}.stepper{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:14px 0}.step{min-height:72px;padding:9px;border:1px solid var(--line);border-radius:14px;background:#0d1422;text-align:left}.step b,.step small{display:block}.step small{margin-top:4px;color:var(--muted);font-size:.7rem}.step.active{border-color:rgba(124,92,255,.7);background:rgba(124,92,255,.14)}.step.done{border-color:rgba(45,212,168,.35);background:rgba(45,212,168,.07)}.lesson{padding:22px}.lesson h2{margin:0 0 8px;font-size:1.55rem}.lesson-intro{color:#c6d0df;line-height:1.6}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}.block{padding:15px;border:1px solid var(--line);border-radius:16px;background:var(--surface)}.block.full{grid-column:1/-1}.block h3{margin:0 0 8px;font-size:1rem}.block p,.block li{color:#c0cad8;line-height:1.55}.block ul{margin:0;padding-left:20px}.model{border-color:rgba(36,200,238,.3);background:rgba(36,200,238,.055)}.practice{border-color:rgba(45,212,168,.32);background:rgba(45,212,168,.055)}.warning{border-color:rgba(244,196,81,.32);background:rgba(244,196,81,.05)}pre{overflow:auto;margin:0;padding:14px;border:1px solid #32405a;border-radius:13px;background:#070b12;color:#dbeafe;line-height:1.5;white-space:pre-wrap}code{font-family:"SFMono-Regular",Consolas,monospace}.field{display:grid;gap:7px}.field label{font-weight:800;color:#d0d8e4}.field textarea{width:100%;min-height:170px;padding:13px;border:1px solid #40506e;border-radius:13px;background:#080d17;resize:vertical}.criteria{display:grid;gap:7px;margin-top:12px}.criterion{display:flex;gap:8px;align-items:flex-start;color:#c5cfdd}.criterion:before{content:"✓";color:var(--green);font-weight:900}.actions{display:flex;justify-content:space-between;flex-wrap:wrap;gap:9px;margin-top:18px}.quiz{display:grid;gap:14px}.question{padding:14px;border:1px solid var(--line);border-radius:15px;background:#0e1524}.question h3{margin:0 0 10px;font-size:1rem}.answers{display:grid;gap:7px}.answer{padding:10px 12px;border:1px solid #34435e;border-radius:11px;background:#111b2d;text-align:left;cursor:pointer}.answer.selected{border-color:var(--primary);background:rgba(124,92,255,.16)}.feedback{margin-top:12px;padding:12px;border-radius:13px;background:#0d1422;color:#cbd5e1}.locked{padding:30px;text-align:center;color:var(--muted)}.save{position:fixed;right:18px;bottom:18px;padding:9px 13px;border:1px solid var(--line);border-radius:999px;background:rgba(17,24,39,.93);color:#b8c4d6;font-size:.76rem}.save.ok:before{content:"●";color:var(--green);margin-right:7px}.save.busy:before{content:"●";color:var(--yellow);margin-right:7px}@media(max-width:900px){.layout{grid-template-columns:1fr}.sidebar{position:static;max-height:none}.stage-topics{max-height:260px;overflow:auto}.grid{grid-template-columns:1fr}.block.full{grid-column:auto}.stepper{grid-template-columns:repeat(5,minmax(105px,1fr));overflow:auto;padding-bottom:5px}.hero-row{align-items:center}.score{width:76px;height:76px}}@media(max-width:560px){.shell{width:min(100% - 16px,1320px)}.top{align-items:flex-start}.brand small{display:none}.top-actions .btn{padding:0 10px}.hero,.lesson,.sidebar{padding:15px}.hero-row{display:grid;grid-template-columns:1fr auto}.hero h1{font-size:1.65rem}.stepper{margin-inline:-2px}.step{min-width:110px}.actions .btn{flex:1}.score{width:68px;height:68px}}

<script>
const DB_NAME='ai-forge-path-v2',STATE_KEY='current-state',LOCAL_KEY='ai-forge-path-state-v2';
const STEPS=[{id:'learn',title:'1. Понять',hint:'простое объяснение'},{id:'example',title:'2. Пример',hint:'разбор решения'},{id:'practice',title:'3. Практика',hint:'сделать руками'},{id:'quiz',title:'4. Проверка',hint:'минимум 2 из 3'},{id:'summary',title:'5. Итог',hint:'закрепить навык'}];
const GUIDES={python:{why:'Python связывает данные, модели, API и автоматизацию. Здесь важно не заучивать синтаксис, а научиться превращать задачу в последовательность понятных операций.',model:'Данные входят в программу → код преобразует их → результат сохраняется или передаётся следующему компоненту.',points:['Выбирай структуру данных по задаче','Разбивай код на маленькие проверяемые части','Явно обрабатывай ошибки и граничные случаи'],principle:'Сначала добиться корректного результата на маленьком примере, затем обобщать.',mistakes:['Писать большой скрипт без разбиения','Смешивать ввод, логику и вывод','Игнорировать типы данных и ошибки'],example:'def process_request(text: str) -> dict:\n    clean = text.strip()\n    if not clean:\n        raise ValueError("Пустой запрос")\n    return {"text": clean, "length": len(clean)}'},libraries:{why:'Библиотеки дают готовые инструменты для чисел, таблиц, графиков и моделей. Навык — понимать форму данных и проверять результат каждого преобразования.',model:'Загрузка данных → очистка → анализ → визуализация или обучение модели → оценка качества.',points:['Всегда исследуй форму и качество данных','Отделяй признаки от целевой переменной','Сравнивай результат с простым baseline'],principle:'Каждое преобразование данных должно быть объяснимым и проверяемым.',mistakes:['Обучать модель на грязных данных','Оценивать качество на обучающей выборке','Строить график без подписей и вывода'],example:'import pandas as pd\ndf = pd.read_csv("data.csv")\nprint(df.shape)\nprint(df.isna().sum())\nsummary = df.groupby("category").size()\nprint(summary)'},fundamentals:{why:'Основы AI нужны, чтобы правильно выбрать метод и не использовать нейросеть там, где достаточно правил или обычной аналитики.',model:'Задача → данные и ограничения → подход → метрика качества → проверка рисков.',points:['Различай AI, ML, Deep Learning и Generative AI','Определяй вход, выход и критерий успеха','Проверяй ошибки модели на реальных сценариях'],principle:'Выбирай самый простой подход, который надёжно решает задачу.',mistakes:['Начинать с инструмента, а не с проблемы','Не задавать метрику успеха','Считать вероятностный ответ фактом'],example:'Задача: распределить обращения по отделам.\nВход: текст обращения.\nВыход: категория.\nBaseline: правила по ключевым словам.\nML/LLM нужен, если правил недостаточно.'},prompting:{why:'Промпт — это спецификация работы модели. Хороший промпт задаёт цель, контекст, ограничения, формат и способ проверки.',model:'Роль и цель → факты контекста → задача → ограничения → формат ответа → критерии качества.',points:['Отделяй инструкции от данных','Показывай примеры нужного формата','Требуй отмечать неопределённость'],principle:'Промпт должен уменьшать число допустимых неправильных ответов.',mistakes:['Просить «сделай хорошо» без критериев','Перегружать запрос противоречивыми правилами','Не задавать формат результата'],example:'Роль: аналитик обращений.\nЗадача: выбери одну категорию.\nВерни JSON: {"category":"...","confidence":0-1,"reason":"..."}.\nНе выдумывай факты.'},llm:{why:'LLM предсказывает продолжение текста, а не извлекает гарантированно истинный ответ. Контекст и параметры определяют качество, цену и стабильность.',model:'Текст → токены → контекст модели → вероятности следующего токена → ответ → внешняя проверка.',points:['Контекст должен быть релевантным','Temperature меняет вариативность, а не знания','Факты нужно проверять источниками'],principle:'Используй LLM для языковой работы, но проверяй критичные факты вне модели.',mistakes:['Считать уверенный тон доказательством','Передавать весь архив вместо нужных фактов','Не контролировать стоимость контекста'],example:'messages = [\n {"role":"system","content":"Отвечай по фактам контекста"},\n {"role":"user","content":"Контекст: ...\\nВопрос: ..."}\n]\n# затем проверь ответ'},rag:{why:'RAG добавляет модели найденные фрагменты документов. Качество определяется разбиением, поиском, фильтрами и цитированием.',model:'Вопрос → embedding → поиск фрагментов → фильтрация → контекст → ответ со ссылками.',points:['Chunk должен сохранять законченную мысль','Храни источник и метаданные','Измеряй качество поиска отдельно от ответа'],principle:'Сначала убедись, что найден правильный контекст, затем оценивай ответ модели.',mistakes:['Неподходящий размер chunks','Нет фильтра по версии документа','Ответ без источников'],example:'query = embed(question)\nhits = vector_db.search(query, top_k=5)\ncontext = "\\n\\n".join(hit.text for hit in hits)\nanswer = llm(question, context)'},agents:{why:'Агент нужен, когда система должна выбирать действия и использовать инструменты. Надёжность появляется из явного состояния и проверки результата.',model:'Цель → состояние → выбор действия → безопасный tool call → наблюдение → проверка → остановка.',points:['Инструмент имеет строгую схему','Опасные действия требуют подтверждения','У цикла есть лимит'],principle:'Давай агенту только необходимые полномочия и проверяй последствия каждого действия.',mistakes:['Бесконечный цикл','Инструменты без валидации','Несколько агентов без владельца состояния'],example:'while steps < MAX_STEPS:\n    action = planner(state, tools)\n    result = execute_validated(action)\n    state = update_state(state, result)\n    if goal_reached(state): break'},frameworks:{why:'Фреймворки ускоряют сборку цепочек, графов и RAG, но не заменяют понимание состояния, данных и ошибок.',model:'Требования → минимальная архитектура → компоненты фреймворка → наблюдаемое выполнение → тесты.',points:['Сначала собери простой вариант','Храни бизнес-логику отдельно','Логируй переходы состояния'],principle:'Фреймворк должен упрощать архитектуру, а не диктовать её.',mistakes:['Подключать фреймворк до понимания задачи','Скрывать критичную логику','Не фиксировать версии'],example:'graph.add_node("plan", plan)\ngraph.add_node("act", act)\ngraph.add_edge("plan", "act")\ngraph.add_conditional_edges("act", should_continue)'},backend:{why:'Backend превращает AI-функцию в сервис: принимает запросы, проверяет данные, хранит состояние и возвращает предсказуемый ответ.',model:'Клиент → endpoint → валидация → AI-логика → база → ответ и логирование.',points:['Проверяй вход через схемы','Разделяй API, сервисы и данные','Не возвращай секреты'],principle:'Контракт API должен быть стабильным при изменении внутренней AI-логики.',mistakes:['Ключи API в коде','Нет таймаутов','Вся логика внутри endpoint'],example:'@app.post("/chat")\nasync def chat(request: ChatRequest):\n    result = await service.answer(request.message)\n    return ChatResponse(answer=result.text)'},deployment:{why:'Деплой — воспроизводимый запуск, наблюдение и безопасное обновление приложения.',model:'Код → тесты → образ → окружение → запуск → health check → логи и откат.',points:['Конфигурация вне кода','Сборка воспроизводима','Есть health check и rollback'],principle:'Хороший деплой можно повторить и безопасно отменить.',mistakes:['Ручные изменения на сервере','Нет логов','Обновление без отката'],example:'FROM python:3.12-slim\nWORKDIR /app\nCOPY requirements.txt .\nRUN pip install -r requirements.txt\nCOPY . .\nCMD ["uvicorn","main:app","--host","0.0.0.0"]'},portfolio:{why:'Проект подтверждает навык лучше списка просмотренных уроков. Он должен иметь проблему, рабочий результат и инструкцию запуска.',model:'Проблема → критерии готовности → минимальная версия → тестирование → демонстрация → улучшения.',points:['README объясняет ценность и запуск','Есть примеры входа и выхода','Описаны ограничения'],principle:'Показывай решённую задачу и доказательства качества.',mistakes:['Нет инструкции запуска','Интерфейс без логики','Нет описания ограничений'],example:'README:\n1. Проблема\n2. Архитектура\n3. Запуск\n4. Примеры\n5. Метрики\n6. Улучшения'}};
let db=null,state=null,currentId=null,currentStep=0;const $=s=>document.querySelector(s),allTopics=()=>ROADMAP.flatMap((stage,si)=>stage.topics.map((t,ti)=>({...t,stageId:stage.id,stageTitle:stage.title,si,ti})));const esc=v=>String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
function defaultState(){return{schemaVersion:2,topics:{},projects:{},assessment:{ratings:{}},stageQuiz:{},history:[],activityDates:[],engagement:{xpTotal:0},academy:{activeTopicId:null,sessions:{}}}}function normalize(s){const x=s&&typeof s==='object'?s:defaultState();x.topics=x.topics||{};x.history=Array.isArray(x.history)?x.history:[];x.stageQuiz=x.stageQuiz||{};x.engagement=x.engagement||{xpTotal:0};x.academy=x.academy||{activeTopicId:null,sessions:{}};x.academy.sessions=x.academy.sessions||{};return x}async function openDb(){return new Promise(resolve=>{if(!indexedDB)return resolve(null);const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=()=>{const d=r.result;if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv')};r.onsuccess=()=>resolve(r.result);r.onerror=()=>resolve(null)})}async function idbGet(){if(!db)return null;return new Promise(resolve=>{const r=db.transaction('kv','readonly').objectStore('kv').get(STATE_KEY);r.onsuccess=()=>resolve(r.result||null);r.onerror=()=>resolve(null)})}async function idbPut(value){if(!db)return;return new Promise(resolve=>{const tx=db.transaction('kv','readwrite');tx.objectStore('kv').put(value,STATE_KEY);tx.oncomplete=resolve;tx.onerror=resolve})}async function load(){db=await openDb();let x=await idbGet();if(!x)try{x=JSON.parse(localStorage.getItem(LOCAL_KEY)||'null')}catch{}state=normalize(x);const q=new URLSearchParams(location.search).get('topic');currentId=(q&&getTopic(q)?q:null)||state.academy.activeTopicId||getCurrent()?.id||allTopics()[0]?.id;openTopic(currentId,false);$('#saveState').className='save ok';$('#saveState').textContent='Прогресс сохранён'}async function save(){const el=$('#saveState');el.className='save busy';el.textContent='Сохраняю…';state.academy.activeTopicId=currentId;localStorage.setItem(LOCAL_KEY,JSON.stringify(state));await idbPut(state);setTimeout(()=>{el.className='save ok';el.textContent='Прогресс сохранён'},150)}function getTopic(id){return allTopics().find(t=>t.id===id)}function topicData(id){return state.topics[id]||(state.topics[id]={status:'not_started',practiceDone:false,reviewCount:0,minutes:0,notes:''})}function session(id){return state.academy.sessions[id]||(state.academy.sessions[id]={step:0,completed:{},practiceDraft:'',reflection:'',quizScore:0,quizAnswers:{},awarded:{},startedAt:new Date().toISOString()})}function getCurrent(){return allTopics().find(t=>topicData(t.id).status!=='mastered')||allTopics()[0]}function addHistory(type,title,detail,extra={}){state.history.unshift({id:crypto.randomUUID?crypto.randomUUID():String(Date.now()),type,title,detail,timestamp:new Date().toISOString(),...extra});state.history=state.history.slice(0,1500)}function award(key,xp){const s=session(currentId);if(s.awarded[key])return;s.awarded[key]=true;state.engagement.xpTotal=Number(state.engagement.xpTotal||0)+xp}function lesson(item){const g=GUIDES[item.stageId]||GUIDES.portfolio;return{g,objective:`После урока ты сможешь объяснить «${item.title}» простыми словами и применить это в небольшой рабочей задаче.`,explanation:`${item.summary} ${g.why}`,practice:item.practice,criteria:['Результат можно запустить или проверить','Ты можешь объяснить, почему выбрал такое решение','Обработан хотя бы один неправильный или граничный случай']}}
function openTopic(id,push=true){const item=getTopic(id);if(!item)return;currentId=id;state.academy.activeTopicId=id;const s=session(id);currentStep=Math.max(0,Math.min(4,Number(s.step||0)));if(topicData(id).status==='not_started'){topicData(id).status='learning';topicData(id).startedAt=new Date().toISOString();addHistory('topic',`Начата тема «${item.title}»`,`${item.stageTitle}: открыта пошаговая учебная сессия.`,{topicId:id,stageId:item.stageId})}if(push)history.replaceState(null,'',`academy.html?topic=${encodeURIComponent(id)}`);render();save()}function render(){renderCourse();renderHeader();renderStepper();renderStep()}function renderCourse(){$('#courseMap').innerHTML=ROADMAP.map((stage,si)=>{const topics=stage.topics.map(t=>{const d=topicData(t.id),active=t.id===currentId;return`<button class="topic-link ${active?'active':''} ${d.status==='mastered'?'done':''}" data-topic="${t.id}"><span class="dot">${d.status==='mastered'?'✓':t.id===currentId?'▶':'·'}</span><span>${esc(t.title)}</span><small>${d.status==='mastered'?'готово':d.status==='not_started'?'не начато':'в работе'}</small></button>`}).join('');const isOpen=stage.topics.some(t=>t.id===currentId);const done=stage.topics.filter(t=>topicData(t.id).status==='mastered').length;return`<section class="stage ${isOpen?'open':''}"><button class="stage-head" data-stage="${stage.id}"><span class="stage-num">${si+1}</span><span><b>${esc(stage.title)}</b><small>${done}/${stage.topics.length} тем</small></span><span>⌄</span></button><div class="stage-topics">${topics}</div></section>`}).join('');document.querySelectorAll('[data-topic]').forEach(b=>b.onclick=()=>openTopic(b.dataset.topic));document.querySelectorAll('[data-stage]').forEach(b=>b.onclick=()=>b.closest('.stage').classList.toggle('open'))}function renderHeader(){const item=getTopic(currentId),s=session(currentId),done=STEPS.filter(x=>s.completed[x.id]).length,pct=Math.round(done/STEPS.length*100);$('#stageLabel').textContent=item.stageTitle.toUpperCase();$('#topicTitle').textContent=item.title;$('#topicSummary').textContent=item.summary;$('#progressText').textContent=pct+'%';$('#progressBar').style.width=pct+'%';$('#scoreRing').style.setProperty('--pct',pct+'%')}function renderStepper(){const s=session(currentId);$('#stepper').innerHTML=STEPS.map((x,i)=>`<button class="step ${s.completed[x.id]?'done':''} ${i===currentStep?'active':''}" data-step="${i}" ${i>firstUnlocked(s)?'disabled':''}><b>${s.completed[x.id]?'✓ ':''}${x.title}</b><small>${x.hint}</small></button>`).join('');document.querySelectorAll('[data-step]').forEach(b=>b.onclick=()=>{currentStep=Number(b.dataset.step);session(currentId).step=currentStep;render();save()})}function firstUnlocked(s){for(let i=0;i<STEPS.length;i++)if(!s.completed[STEPS[i].id])return i;return 4}function completeStep(id){const s=session(currentId);s.completed[id]=true;const i=STEPS.findIndex(x=>x.id===id);currentStep=Math.min(4,i+1);s.step=currentStep;render();save()}function navButtons(back=true,nextLabel='Следующий шаг'){return`<div class="actions">${back?'<button class="btn quiet" id="backStep">← Назад</button>':'<span></span>'}<button class="btn primary" id="nextStep">${nextLabel}</button></div>`}function bindNav(next){$('#backStep')?.addEventListener('click',()=>{currentStep=Math.max(0,currentStep-1);session(currentId).step=currentStep;render();save()});$('#nextStep')?.addEventListener('click',next)}
function renderStep(){const item=getTopic(currentId),s=session(currentId),L=lesson(item),area=$('#lessonArea');if(currentStep===0){area.innerHTML=`<p class="eyebrow">ШАГ 1 · ПОНИМАНИЕ</p><h2>Разберись в главной идее</h2><p class="lesson-intro">${esc(L.objective)}</p><div class="grid"><article class="block full"><h3>Простое объяснение</h3><p>${esc(L.explanation)}</p></article><article class="block model"><h3>Ментальная модель</h3><p>${esc(L.g.model)}</p></article><article class="block"><h3>Что обязательно понять</h3><ul>${L.g.points.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></article><article class="block full warning"><h3>Типичные ошибки</h3><ul>${L.g.mistakes.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></article></div>${navButtons(false,s.completed.learn?'Перейти к примеру':'Я понял главную идею')}`;bindNav(()=>completeStep('learn'))}else if(currentStep===1){area.innerHTML=`<p class="eyebrow">ШАГ 2 · РАЗБОР</p><h2>Посмотри, как мысль превращается в решение</h2><p class="lesson-intro">${esc(L.g.principle)}</p><div class="grid"><article class="block full"><h3>Минимальный рабочий пример</h3><pre><code>${esc(L.g.example)}</code></pre></article><article class="block"><h3>Как читать пример</h3><ol><li>Определи входные данные.</li><li>Найди основное преобразование.</li><li>Проверь выход и обработку ошибки.</li></ol></article><article class="block model"><h3>Главный принцип</h3><p>${esc(L.g.principle)}</p></article></div>${navButtons(true,s.completed.example?'Перейти к практике':'Пример разобран')}`;bindNav(()=>completeStep('example'))}else if(currentStep===2){area.innerHTML=`<p class="eyebrow">ШАГ 3 · ПРАКТИКА</p><h2>Сделай задачу руками</h2><div class="grid"><article class="block practice full"><h3>Задание</h3><p>${esc(L.practice)}</p><div class="criteria">${L.criteria.map(x=>`<span class="criterion">${esc(x)}</span>`).join('')}</div></article><article class="block full"><div class="field"><label for="practiceDraft">Вставь код, план решения или отчёт о результате</label><textarea id="practiceDraft" placeholder="Покажи, что именно ты создал и как проверил результат.">${esc(s.practiceDraft||'')}</textarea></div><div id="practiceFeedback"></div></article></div>${navButtons(true,s.completed.practice?'Перейти к проверке':'Проверить практику')}`;$('#practiceDraft').oninput=e=>{s.practiceDraft=e.target.value;save()};bindNav(()=>{const text=$('#practiceDraft').value.trim();if(text.length<40){$('#practiceFeedback').innerHTML='<div class="feedback">Добавь код, шаги решения, результат и способ проверки. Минимум 40 символов.</div>';return}s.practiceDraft=text;const d=topicData(item.id);d.practiceDone=true;d.practiceCompletedAt=new Date().toISOString();d.status='review';addHistory('practice',`Выполнена практика «${item.title}»`,item.practice,{topicId:item.id,stageId:item.stageId});award('practice',20);completeStep('practice')})}else if(currentStep===3)renderQuiz(item,L);else renderSummary(item,L)}
function questions(item,L){const same=getStageTopics(item.stageId).filter(x=>x.id!==item.id);return[{q:`Какое описание точнее соответствует теме «${item.title}»?`,a:[item.summary,same[0]?.summary||'Это способ хранения секретных ключей.',same[1]?.summary||'Это только оформление интерфейса.'],c:0},{q:'Что лучше всего доказывает, что тема освоена?',a:[item.practice,'Только прочитать определение.','Запомнить название без применения.'],c:0},{q:'Какой подход правильнее?',a:[L.g.principle,L.g.mistakes[0],L.g.mistakes[1]],c:0}]}function getStageTopics(stageId){const st=ROADMAP.find(x=>x.id===stageId);return st?st.topics:[]}function renderQuiz(item,L){const s=session(item.id),qs=questions(item,L);$('#lessonArea').innerHTML=`<p class="eyebrow">ШАГ 4 · ПРОВЕРКА</p><h2>Проверь понимание, а не память</h2><p class="lesson-intro">Нужно минимум 2 правильных ответа из 3.</p><div class="quiz">${qs.map((q,qi)=>`<article class="question"><h3>${qi+1}. ${esc(q.q)}</h3><div class="answers">${q.a.map((a,ai)=>`<button class="answer ${s.quizAnswers[qi]===ai?'selected':''}" data-q="${qi}" data-a="${ai}">${esc(a)}</button>`).join('')}</div></article>`).join('')}</div><div id="quizFeedback">${s.quizScore?`<div class="feedback">Последний результат: ${s.quizScore}%.</div>`:''}</div>${navButtons(true,s.completed.quiz?'Перейти к итогу':'Проверить ответы')}`;document.querySelectorAll('.answer').forEach(b=>b.onclick=()=>{s.quizAnswers[b.dataset.q]=Number(b.dataset.a);renderQuiz(item,L);save()});bindNav(()=>{if(Object.keys(s.quizAnswers).length<3){$('#quizFeedback').innerHTML='<div class="feedback">Ответь на все три вопроса.</div>';return}let correct=0;qs.forEach((q,i)=>{if(s.quizAnswers[i]===q.c)correct++});s.quizScore=Math.round(correct/3*100);state.stageQuiz[item.stageId]={score:Math.max(Number(state.stageQuiz[item.stageId]?.score||0),s.quizScore),latestScore:s.quizScore,completedAt:new Date().toISOString()};addHistory('assessment',`Проверка темы «${item.title}»`,`Результат: ${s.quizScore}%.`,{topicId:item.id,stageId:item.stageId,score:s.quizScore});if(correct>=2){award('quiz',20);completeStep('quiz')}else{$('#quizFeedback').innerHTML=`<div class="feedback">Результат ${s.quizScore}%. Вернись к объяснению и попробуй ещё раз.</div>`;s.quizAnswers={};save()}})}
function renderSummary(item,L){const s=session(item.id),ready=s.completed.practice&&s.completed.quiz;$('#lessonArea').innerHTML=`<p class="eyebrow">ШАГ 5 · ЗАКРЕПЛЕНИЕ</p><h2>${ready?'Зафиксируй навык':'Сначала заверши практику и проверку'}</h2>${ready?`<div class="grid"><article class="block"><h3>Что ты теперь умеешь</h3><p>${esc(L.objective)}</p></article><article class="block model"><h3>Шпаргалка</h3><ul>${L.g.points.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></article><article class="block full"><div class="field"><label for="reflection">Объясни тему своими словами и напиши, где применишь её</label><textarea id="reflection" placeholder="2–5 конкретных предложений">${esc(s.reflection||'')}</textarea></div><div id="summaryFeedback"></div></article></div>`:'<div class="locked">Следующие шаги заблокированы, чтобы тема не превращалась в формальную галочку.</div>'}<div class="actions"><button class="btn quiet" id="backStep">← Назад</button>${ready?'<button class="btn primary" id="finishTopic">Завершить тему и перейти дальше</button>':''}</div>`;$('#backStep').onclick=()=>{currentStep=3;s.step=3;render();save()};$('#reflection')?.addEventListener('input',e=>{s.reflection=e.target.value;save()});$('#finishTopic')?.addEventListener('click',()=>{const text=$('#reflection').value.trim();if(text.length<25){$('#summaryFeedback').innerHTML='<div class="feedback">Сформулируй: что это, зачем нужно и где применишь.</div>';return}s.reflection=text;s.completed.summary=true;const d=topicData(item.id);d.status='mastered';d.masteredAt=new Date().toISOString();d.notes=text;addHistory('topic',`Освоена тема «${item.title}»`,`${item.stageTitle}: пройдены объяснение, пример, практика и проверка.`,{topicId:item.id,stageId:item.stageId});award('mastered',20);const topics=allTopics(),idx=topics.findIndex(x=>x.id===item.id),next=topics[idx+1];save().then(()=>next?openTopic(next.id):location.href='./')})}
$('#continueBtn').onclick=()=>openTopic(getCurrent()?.id||currentId);load().catch(err=>{$('#lessonArea').innerHTML=`<div class="locked">Не удалось загрузить данные: ${esc(err.message)}</div>`});
</script>
