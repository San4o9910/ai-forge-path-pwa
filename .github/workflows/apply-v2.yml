name: Apply AI Forge Path v2 release

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/apply-v2.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-v2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore v2 application files
        shell: bash
        run: |
          cat .release-v2/payload-* | tr -d '[:space:]' | base64 --decode | tar -xz

      - name: Commit v2 release
        shell: bash
        run: |
          git config user.name "AI Forge Path Release"
          git config user.email "actions@users.noreply.github.com"
          git add index.html styles.css app.js data.js core.js render.js dialogs.js manifest.json sw.js README.md CHANGELOG.md
          git rm -r .release-v2
          if git diff --cached --quiet; then
            echo "No v2 changes to commit"
            exit 0
          fi
          git commit -m "Release AI Forge Path v2"
          git push origin HEAD:main
